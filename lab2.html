<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>finals lab task 2</title>

  <style>
    body { font-family: sans-serif; padding: 20px; }

    .box-a { display: flex; }
    .box-a .item1 { width: 200px; background: #bad0e3; padding: 5px; }
    .box-a .item2 { width: 75px;  background: #f5b7dd; padding: 5px; }

    .box-b { display: flex; }
    .box-b .item1 { width: 50px; background: #bad0e3; padding: 5px; }
    .box-b .item2 { flex: 1;     background: #f5b7dd; padding: 5px; }
    .box-b .item3 { width: 75px; background: #bad0e3; padding: 5px; }

    .box-c { display: flex; justify-content: space-between; }
    .box-c div { background: #f5b7dd; padding: 5px; }

    .box-d {
      display: flex;
      justify-content: space-between;
      height: 50px;
      border: 1px solid gray;
      align-items: center;
      padding: 0 10px;
    }
    .box-d .item1 { background: #f5b7dd; padding: 5px 10px; }
    .box-d .item2 { background: #f5b7dd; padding: 5px 10px; }

    .section { margin-bottom: 20px; }
  </style>
</head>
<body>

  <div class="section">
    <div class="box-a">
      <div class="item1">200px</div>
      <div class="item2">75px</div>
    </div>
  </div>

  <div class="section">
    <div class="box-b">
      <div class="item1">item1</div>
      <div class="item2">item2</div>
      <div class="item3">item3</div>
    </div>
  </div>

  <div class="section">
    <div class="box-c">
      <div>item1</div>
      <div>item2</div>
      <div>item3</div>
      <div>item4</div>
    </div>
  </div>

  <div class="section">
    <div class="box-d">
      <div class="item1">item1</div>
      <div class="item2">item2</div>
    </div>
  </div>


<h2></h2>

</body>
</html>
